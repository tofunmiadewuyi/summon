name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            goarch: arm64
          # - runner: macos-13
          #   goarch: amd64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build + package
        run: |
          VERSION=${GITHUB_REF_NAME}
          PROGRAM="summon"
          NAME="${PROGRAM}_${VERSION}_darwin_${{ matrix.goarch }}"
          mkdir -p dist
          go build -ldflags="-s -w -X main.version=$VERSION" -o "dist/$NAME" ./cmd
          zip -j "dist/${NAME}.zip" "dist/$NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: summon-darwin-${{ matrix.goarch }}
          path: dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
