name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build + package
        run: |
          mkdir -p dist

          VERSION=${GITHUB_REF_NAME}
          PROGRAM="summon"

          for GOARCH in amd64 arm64; do
            NAME="${PROGRAM}_${VERSION}_darwin_${GOARCH}"
            GOOS=darwin GOARCH=$GOARCH \
              go build -ldflags="-s -w -X main.version=$VERSION" -o "dist/$NAME" ./cmd
            zip -j "dist/${NAME}.zip" "dist/$NAME"
            rm "dist/$NAME"
          done

      - name: Create Release + Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
